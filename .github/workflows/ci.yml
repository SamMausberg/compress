name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  PYTHONUNBUFFERED: "1"

jobs:
  lint-python:
    name: Python lint + type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Sync dev environment
        run: uv sync --locked --group dev --no-install-project
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: pyright
        run: uv run pyright python
      - name: deptry
        run: uv run deptry python

  lint-rust:
    name: Rust fmt + clippy + doc
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: cargo doc (deny warnings)
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  test-rust:
    name: Rust tests (nextest + doctests)
    runs-on: ubuntu-24.04
    needs: lint-rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo build --workspace --locked
      - run: cargo nextest run --workspace --all-targets --locked
      - run: cargo test --workspace --doc --locked

  test-python:
    name: Python tests
    runs-on: ubuntu-24.04
    needs: [lint-python, lint-rust]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv python install 3.14
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Sync project (builds the maturin extension)
        run: uv sync --locked --group dev
      - name: Smoke import
        run: uv run python -c "import vpm; print(vpm.__version__)"
      - name: Boundary import
        run: uv run python -c "from vpm._native import contract, ledger, dsl, egraph, authority, verify"
      - name: pytest
        run: uv run pytest -q

  msrv:
    name: MSRV (Rust 1.86)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked --all-targets

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv python install 3.14
      - name: Sync dev environment
        run: uv sync --locked --group dev --no-install-project
      - name: pip-audit
        run: uv run pip-audit

  typos:
    name: Typos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.46.0

  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        # Action shipped by the actionlint maintainers; no inputs required.
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  loc-budget:
    name: LOC budget
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        # tomllib is in stdlib from 3.11; ubuntu-24.04 ships 3.12 by default,
        # but pin to be explicit (and to match the dev toolchain we test on).
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scripts/check-loc.py (hard mode)
        env:
          LOC_HARD: "1"
        run: python3 scripts/check-loc.py

  pr-size-advisory:
    name: PR size advisory
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute net additions vs. base
        id: diffstat
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          ADDED=$(git diff --shortstat "origin/$BASE_REF...HEAD" \
            | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          REMOVED=$(git diff --shortstat "origin/$BASE_REF...HEAD" \
            | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          NET=$((ADDED - REMOVED))
          {
            echo "added=$ADDED"
            echo "removed=$REMOVED"
            echo "net=$NET"
          } >> "$GITHUB_OUTPUT"
          echo "Net additions: $NET (+$ADDED / -$REMOVED)"
      - name: Comment if PR exceeds 1,200 net lines
        if: steps.diffstat.outputs.net > 1200
        uses: actions/github-script@v8
        with:
          script: |
            const net = ${{ steps.diffstat.outputs.net }};
            const added = ${{ steps.diffstat.outputs.added }};
            const removed = ${{ steps.diffstat.outputs.removed }};
            const body = [
              `**LOC advisory**: this PR adds **${net}** net lines `,
              `(+${added} / -${removed}), above the 1,200-line soft trip-wire.\n\n`,
              `This is the canonical signature of an AI assistant regenerating `,
              `a file end-to-end instead of editing it. Worth a glance to see `,
              `whether the diff could be split or trimmed before merge.\n\n`,
              `Not a blocker — see \`.loc-budget.toml\` for the per-file/per-folder `,
              `caps that *do* block CI.`,
            ].join('');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
