name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  PYTHONUNBUFFERED: "1"

jobs:
  lint-python:
    name: Python lint + type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Sync dev environment
        run: uv sync --locked --group dev --no-install-project
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: pyright
        run: uv run pyright python
      - name: deptry
        run: uv run deptry python

  lint-rust:
    name: Rust fmt + clippy + doc
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: cargo doc (deny warnings)
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  test-rust:
    name: Rust tests (nextest + doctests)
    runs-on: ubuntu-24.04
    needs: lint-rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo build --workspace --locked
      - run: cargo nextest run --workspace --all-targets --locked
      - run: cargo test --workspace --doc --locked

  test-python:
    name: Python tests
    runs-on: ubuntu-24.04
    needs: [lint-python, lint-rust]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv python install 3.14
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Sync project (builds the maturin extension)
        run: uv sync --locked --group dev
      - name: Smoke import
        run: uv run python -c "import vpm; print(vpm.__version__)"
      - name: Boundary import
        run: uv run python -c "from vpm._native import contract, ledger, dsl, egraph, authority, verify"
      - name: pytest
        run: uv run pytest -q

  msrv:
    name: MSRV (Rust 1.86)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked --all-targets

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv python install 3.14
      - name: Sync dev environment
        run: uv sync --locked --group dev --no-install-project
      - name: pip-audit
        run: uv run pip-audit

  typos:
    name: Typos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.46.0

  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        # Action shipped by the actionlint maintainers; no inputs required.
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true
