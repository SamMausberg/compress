name: Multi-OS sanity

# Light cross-platform check. Runs `cargo check --workspace` and
# Python unit tests only — full test matrix stays on ubuntu-24.04 in
# ci.yml. The point is to catch path / line-ending / Windows-Defender
# regressions early, not to duplicate CI.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PYTHONUNBUFFERED: "1"

jobs:
  sanity:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (workspace)
        env:
          PYO3_NO_PYTHON: "1"
        run: cargo check --workspace --locked --all-targets

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Sync project (builds the maturin extension)
        run: uv sync --locked --group dev
      - name: pytest unit only
        # Don't run gpu / slow / integration on cross-OS — the goal is to
        # catch path bugs, not to redo the full suite.
        run: uv run pytest -q -m "not slow and not gpu and not integration"
