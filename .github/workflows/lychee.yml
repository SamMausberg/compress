name: Link check

on:
  schedule:
    # Weekly at 06:00 UTC Monday — catches arXiv / DOI / GitHub link rot.
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "lychee.toml"
      - ".github/workflows/lychee.yml"
  workflow_dispatch:

concurrency:
  group: lychee-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write   # so the action can file an issue on a scheduled failure

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --no-progress
            'docs/**/*.md'
            'README.md'
            'CHANGELOG.md'
          fail: true
      - name: File issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link checker failure (scheduled run)"
          content-filepath: ./lychee/out.md
          labels: docs, link-rot
